<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ação Social 🎨</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: #e8f5e9; /* Verde bem clarinho */
            color: #2e7d32; 
        }
        .main-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            display: inline-block;
            max-width: 400px;
        }
        h1 { border-bottom: 2px solid #a5d6a7; padding-bottom: 10px; }
        p { color: #555; line-height: 1.6; }
        .btn-voltar { 
            cursor: pointer; 
            margin-top: 20px;
            padding: 12px 25px; 
            background-color: #2e7d32; 
            color: white; 
            border: none; 
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-voltar:hover { background-color: #1b5e20; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>🎨 Ação Social</h1>
        <p>Transformando realidades através da arte e do cuidado mútuo.</p>
        
        <div style="text-align: left; margin: 20px 0;">
            <strong>Próximas Atividades:</strong>
            <ul>
                <li>Oficina de Pintura (Sáb 09h)</li>
                <li>Mutirão de Limpeza (Dom 08h)</li>
                <li>Curso de Artesanato (Seg 14h)</li>
            </ul>
        </div>

        <button class="btn-voltar" onclick="window.location.href='../cartao.html'">
            ⬅ Voltar ao Painel
        </button>
    </div>

</body>
</html>
